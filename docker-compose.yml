version: "3.8"

services:
  db:
    image: mariadb:10.11
    container_name: seafile-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${INIT_SEAFILE_MYSQL_ROOT_PASSWORD}
      - MYSQL_LOG_CONSOLE=true
      - MARIADB_AUTO_UPGRADE=1
    volumes:
      - ${SEAFILE_MYSQL_VOLUME}:/var/lib/mysql
    networks:
      - seafile-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: seafile-redis
    networks:
      - seafile-net
    restart: unless-stopped

  seafile:
    image: seafileltd/seafile-mc:latest
    container_name: seafile
    environment:
      # MySQL Configuration
      - DB_HOST=${SEAFILE_MYSQL_DB_HOST}
      - DB_ROOT_PASSWD=${INIT_SEAFILE_MYSQL_ROOT_PASSWORD}
      - MYSQL_USER=${SEAFILE_MYSQL_DB_USER}
      - MYSQL_USER_PASSWD=${SEAFILE_MYSQL_DB_PASSWORD}
      - MYSQL_USER_HOST=%
      # Time Zone
      - TIME_ZONE=${TIME_ZONE}
      # Seafile Server Configuration
      - SEAFILE_ADMIN_EMAIL=${INIT_SEAFILE_ADMIN_EMAIL}
      - SEAFILE_ADMIN_PASSWORD=${INIT_SEAFILE_ADMIN_PASSWORD}
      - SEAFILE_SERVER_LETSENCRYPT=false
      - SEAFILE_SERVER_HOSTNAME=${SEAFILE_SERVER_HOSTNAME}
      # JWT Configuration
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      # Non-root user
      - NON_ROOT=${NON_ROOT}
    volumes:
      - ${SEAFILE_VOLUME}:/shared
    networks:
      - seafile-net
      - reverse-proxy
    depends_on:
      - db
      - redis
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.scope: "automatic"
      # Traefik options
      traefik.enable: true
      traefik.docker.network: reverse-proxy
      # HTTP router (insecure - redirects to HTTPS)
      traefik.http.routers.seafile-insecure.entrypoints: http
      traefik.http.routers.seafile-insecure.rule: "Host(`${SEAFILE_SERVER_HOSTNAME}`)"
      traefik.http.routers.seafile-insecure.middlewares: https-redirectscheme@file
      # HTTPS router (secure)
      traefik.http.routers.seafile.entrypoints: https
      traefik.http.routers.seafile.rule: "Host(`${SEAFILE_SERVER_HOSTNAME}`)"
      traefik.http.routers.seafile.middlewares: default-headers@file
      traefik.http.routers.seafile.tls: true
      traefik.http.routers.seafile.service: seafile
      # Service configuration
      traefik.http.services.seafile.loadbalancer.server.port: 80

networks:
  seafile-net:
    name: seafile-net
  reverse-proxy:
    external: true
